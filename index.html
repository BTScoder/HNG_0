<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="screen">
      <article class="todo-card" data-testid="test-todo-card">
        <div class="overlay"></div>
        <div class="todo-head">
          <div class="todo-head-left">
            <h2 class="todo-title" data-testid="test-todo-title">
              Finish HNG Task 0
            </h2>
            <div class="status">
              <span class="priority tag" data-testid="test-todo-priority">
                High
              </span>
              <span class="tag stat" data-testid="test-todo-status">
                Pending
              </span>
            </div>
          </div>
          <label class="completed-toggle" for="completed">
            <input
              id="completed"
              type="checkbox"
              data-testid="test-todo-complete-toggle"
            />
            <span>Completed</span>
          </label>
        </div>
        <p class="todo-description" data-testid="test-todo-description">
          Lorem ipsum dolor sit, amet consectetur adipisicing elit. Rerum
          provident atque iste laborum quod earum!
        </p>
        <div class="date-div">
          <p>
            Due Date: <br />
            <time
              class="due-date"
              datetime="2026-10-18"
              data-testid="test-todo-due-date"
            >
              October 18, 2026
            </time>
          </p>
          <p>
            Remaining Time: <br />
            <time data-testid="test-todo-time-remaining" class="time-remaining">
              Due in 3 days
            </time>
          </p>
        </div>
        <!-- Tags -->
        <ul class="tag-div" data-testid="test-todo-tags">
          <li class="tag" data-testid="test-todo-tag">#hng</li>
          <li class="tag" data-testid="test-todo-tag">#task</li>
          <li class="tag" data-testid="test-todo-tag">#frontend</li>
        </ul>

        <!-- Buttons -->
        <div class="buttons">
          <button class="edit" data-testid="test-todo-edit-button">Edit</button>
          <button class="delete" data-testid="test-todo-delete-button">
            Delete
          </button>
        </div>
      </article>
    </main>
    <script src="main.js"></script>
  </body>
</html>
